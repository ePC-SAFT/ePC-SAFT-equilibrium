    - one perturbed confirmation solve
    - specified-pressure stationarity in both phases
    - component chemical-potential equality
    - independent KKT residual using retained equality and bound multipliers
    - positive distinct phase densities and inactive bounds
    - exact provider fingerprint and Hessian evidence
  globality_certificate: none
  tolerances:
    solver_constraint_max: 1.0e-10
    material_balance_max_abs: 1.0e-10
    pressure_stationarity_max_relative: 1.0e-8
    chemical_potential_max_abs: 1.0e-8
