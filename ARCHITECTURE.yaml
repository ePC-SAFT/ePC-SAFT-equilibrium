excluded:
  - mixture equilibrium and mixture native phase blocks
  - association and implicit association derivatives
  - electrolyte and reactive equilibrium
  - density-root derivatives
  - bubble-pressure and dew-pressure routes
  - specified-pressure flash and total-free-energy phase discovery
  - TPD and global stability
  - critical completion and continuation
  - regression and Ceres
  - provider equations, private headers, and private Python modules
  - alternate derivative backends and solver selectors
  - release and workflow machinery

ratchet:
