accepted_capability:
  name: pure-component-saturation-v1
  scope: >-
    Local fixed-temperature pure-component vapor-liquid saturation boundary for
    the provider-approved methane, ethane, and propane parameter fingerprints.
  formulation: >-
    Zero-objective Ipopt feasibility problem in log vapor density, log liquid
    density, and log saturation pressure with pressure-ratio and
    chemical-potential equality constraints.
  local_certificate:
    - accepted Ipopt termination and finite solver constraint violation
    - perturbed-seed agreement
    - pressure and chemical-potential equality
    - positive distinct phase volumes and densities
    - local mechanical stability and inactive bounds
    - exact provider fingerprint and derivative evidence
  globality_certificate: none
  tolerances:
    ipopt_tolerance: 1.0e-10
    solver_constraint_tolerance: 1.0e-10
    physical_pressure_relative_residual_max: 1.0e-8
    physical_chemical_potential_absolute_residual_max: 1.0e-8
    confirmation_relative_difference_max: 1.0e-7
    minimum_relative_phase_density_distance: 1.0e-3
    inactive_log_bound_margin: 1.0e-7
    retained_lab_relative_difference_max: 5.0e-6
    nist_pressure_relative_error_max: 5.0e-3
    nist_liquid_density_relative_error_max: 1.0e-2
  admitted_inputs:
    - component: methane
      parameter_fingerprint: sha256:5f836aa84935df70be2e5cffae51b178a7b797c2cee036e9ff47d8097ca94bbf
      temperature_domain_k: [97.0, 300.0]
    - component: ethane
      parameter_fingerprint: sha256:288fbcaa1304881c16f64c3a784eeed19b75c58cca4558f92a21268e5e91258a
      temperature_domain_k: [90.0, 305.0]
