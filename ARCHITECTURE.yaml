    Local fixed-temperature pure-component vapor-liquid saturation boundary for
    the provider-approved methane, ethane, and propane parameter fingerprints.
  formulation: >-
    Zero-objective Ipopt feasibility problem in log vapor density, log liquid
    density, and log saturation pressure with pressure-ratio and
    chemical-potential equality constraints.
  local_certificate:
    - accepted Ipopt termination and finite solver constraint violation
    - perturbed-seed agreement
    - pressure and chemical-potential equality
    - positive distinct phase volumes and densities
    - local mechanical stability and inactive bounds
    - exact provider fingerprint and derivative evidence
  globality_certificate: none
